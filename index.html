<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro - Distrileco</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-slate-100 min-h-screen pb-24 font-sans text-gray-800">

<header class="bg-blue-900 text-white p-6 text-center">
<h1 class="text-2xl font-black uppercase">DISTRILECO CAUCASIA</h1>
<p class="text-xs">Control Total de Empaquetadora</p>
</header>

<main class="p-4 max-w-6xl mx-auto space-y-6">

<div class="bg-white p-6 rounded-3xl text-center">
<p class="text-xs mb-2">📂 CARGAR EXCEL</p>

<input type="file" id="upload" accept=".xlsx, .xls, .csv">

<p id="status" class="text-xs mt-2">Esperando archivo...</p>

<button onclick="borrarTodo()" class="mt-2 bg-red-200 px-3 py-1 rounded">Reset</button>
</div>

<div id="dashboardUI" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-6">

<div class="bg-white p-4 rounded-xl space-y-3">

<select id="selVendedor" onchange="calcular()" class="w-full"></select>

<select id="selMes" multiple onchange="calcular()" class="w-full h-32"></select>

<select id="selProducto" onchange="calcular()" class="w-full"></select>

<button onclick="enviarWhatsApp()" class="w-full bg-green-600 text-white p-2 rounded">WhatsApp</button>

<button onclick="exportarExcel()" class="w-full bg-blue-600 text-white p-2 rounded">Exportar Excel</button>

</div>

<div class="lg:col-span-3 space-y-4">

<div class="grid grid-cols-2 gap-4">

<div class="bg-blue-800 text-white p-4 rounded text-center">
<p>Total Kilos</p>
<h2 id="totalDisplay">0 Kg</h2>
</div>

<div class="bg-white p-4 rounded">
<p id="mejorVendedor">Vendedor: ---</p>
<p id="mejorCiudad">Ciudad: ---</p>
</div>

</div>

<canvas id="miGrafico"></canvas>
<canvas id="graficoUnidades"></canvas>

</div>
</div>

</main>

<script>

let baseDatos = [];
let chartKilos = null, chartUnidades = null;

const ordenMeses = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];

document.getElementById('upload').addEventListener('change', function(e){

const status = document.getElementById('status');
status.innerText = "Procesando archivo...";

const reader = new FileReader();

reader.onload = (evt) => {

try {

const wb = XLSX.read(evt.target.result, {type:'array'});

const hoja = wb.SheetNames.find(n => n.toLowerCase().trim() === "data");

if(!hoja){
status.innerText = "❌ No existe hoja 'data'";
return;
}

// Leer encabezados correctos
const json = XLSX.utils.sheet_to_json(wb.Sheets[hoja], {
defval: "",
raw: false
});

// Datos desde fila 2
const data = json.slice(1);

// Mapeo EXACTO a tu Excel
baseDatos = data.map(x => ({

mes: (x.mes || "").toString().trim(),
vendedor: (x.nomvendedor || "").toString().trim(),
ref: (x.referencia || "").toString().trim(),
prod: (x.nombre_producto || "").toString().trim(),
cant: parseFloat(x.cantidad) || 0,
peso: parseFloat(x.PESO) || 0,
ciudad: (x.ciudad || "").toString().trim()

})).filter(x => x.mes !== "" && x.cant > 0);

if(baseDatos.length === 0){
status.innerText = "⚠️ No hay datos válidos";
return;
}

localStorage.setItem('data', JSON.stringify(baseDatos));

status.innerText = "✅ Registros cargados: " + baseDatos.length;

activarDashboard();

} catch(err){
console.error(err);
status.innerText = "❌ Error leyendo archivo";
}

};

reader.readAsArrayBuffer(e.target.files[0]);

});

function activarDashboard(){
llenarFiltros();
document.getElementById('dashboardUI').classList.remove('hidden');
calcular();
}

function llenarFiltros(){

const v = new Set(['-- TODOS --']);
const m = new Set();
const p = new Set(['-- TODOS --']);

baseDatos.forEach(d=>{
v.add(d.vendedor);
m.add(d.mes);
p.add(`${d.ref} - ${d.prod}`);
});

poblar('selVendedor',[...v]);
poblar('selMes',[...m],true);
poblar('selProducto',[...p]);

}

function poblar(id, arr, multi=false){
const s = document.getElementById(id);
s.innerHTML="";
arr.forEach(x=>{
let o = new Option(x,x);
if(multi) o.selected=true;
s.add(o);
});
}

function calcular(){

const v = selVendedor.value;
const p = selProducto.value;
const meses = Array.from(selMes.selectedOptions).map(o=>o.value);

let total=0, dK={}, dU={}, rV={}, rC={};

baseDatos.forEach(d=>{

const prodKey = `${d.ref} - ${d.prod}`;

if((v==='-- TODOS --'||d.vendedor===v) &&
(p==='-- TODOS --'||prodKey===p) &&
meses.includes(d.mes)){

const kilos = d.cant * d.peso;

total+=kilos;

dK[d.mes]=(dK[d.mes]||0)+kilos;
dU[prodKey]=(dU[prodKey]||0)+d.cant;
rV[d.vendedor]=(rV[d.vendedor]||0)+kilos;
rC[d.ciudad]=(rC[d.ciudad]||0)+kilos;

}

});

totalDisplay.innerText = total.toLocaleString('es-CO',{minimumFractionDigits:2})+" Kg";

const mv = Object.entries(rV).sort((a,b)=>b[1]-a[1])[0] || ["---",0];
const mc = Object.entries(rC).sort((a,b)=>b[1]-a[1])[0] || ["---",0];

mejorVendedor.innerText = "Vendedor: "+mv[0];
mejorCiudad.innerText = "Ciudad: "+mc[0];

renderCharts(dK,dU);

}

function renderCharts(dK,dU){

if(chartKilos) chartKilos.destroy();

chartKilos = new Chart(miGrafico,{
type:'bar',
data:{
labels:Object.keys(dK),
datasets:[{label:'Kilos',data:Object.values(dK),backgroundColor:'#1e40af'}]
}
});

if(chartUnidades) chartUnidades.destroy();

const top = Object.entries(dU).sort((a,b)=>b[1]-a[1]).slice(0,8);

chartUnidades = new Chart(graficoUnidades,{
type:'bar',
data:{
labels:top.map(x=>x[0]),
datasets:[{label:'Unidades',data:top.map(x=>x[1]),backgroundColor:'#10b981'}]
},
options:{indexAxis:'y'}
});

}

function borrarTodo(){
localStorage.clear();
location.reload();
}

function enviarWhatsApp(){

const t = totalDisplay.innerText;

const msg = `🍚 REPORTE DISTRILECO
📊 Total: ${t}
🚀 Seguimos creciendo`;

window.open(`https://wa.me/3117700431?text=${encodeURIComponent(msg)}`);

}

function exportarExcel(){

const ws = XLSX.utils.json_to_sheet(baseDatos);
const wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb, ws, "Reporte");

XLSX.writeFile(wb, "reporte_distrileco.xlsx");

}

</script>

</body>
</html>

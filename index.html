<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pro - Distrileco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen pb-24 font-sans text-gray-800">

    <header class="bg-blue-900 text-white p-6 shadow-xl text-center">
        <h1 class="text-2xl font-black italic tracking-tighter uppercase">DISTRILECO CAUCASIA</h1>
        <p class="text-[10px] font-bold tracking-widest opacity-75 italic underline decoration-yellow-400">ANÁLISIS DE ALTO RENDIMIENTO</p>
    </header>

    <main class="p-4 max-w-6xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-3xl shadow-md border-2 border-dashed border-blue-400 text-center">
            <p class="text-blue-900 font-bold mb-3 uppercase text-[10px]">📂 ACTUALIZAR DATOS DE EMPAQUETADORA</p>
            <input type="file" id="upload" accept=".xlsx, .xls, .csv" class="mx-auto block text-sm text-gray-500 file:mr-4 file:py-2 file:px-8 file:rounded-full file:border-0 file:bg-blue-700 file:text-white font-bold cursor-pointer transition-all hover:bg-blue-800">
            <div class="flex justify-center gap-4 mt-2">
                <p id="status" class="text-[10px] font-black text-blue-600 italic uppercase bg-blue-50 p-2 rounded-lg"></p>
                <button onclick="borrarMemoria()" class="text-[10px] text-red-500 font-bold hover:underline uppercase">Limpiar Cache</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div id="seccionFiltros" class="hidden lg:col-span-1 space-y-4 bg-white p-6 rounded-3xl shadow-lg border-l-8 border-yellow-400 h-fit">
                <h3 class="font-black text-blue-900 text-xs border-b pb-2 uppercase italic text-center text-blue-800">Panel de Control</h3>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase">Vendedor</label>
                    <select id="selVendedor" onchange="calcular()" class="w-full p-2 bg-gray-50 rounded-xl font-bold text-xs outline-none border border-gray-100"></select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-blue-800 uppercase italic italic">Comparar Meses</label>
                    <select id="selMes" multiple onchange="calcular()" class="w-full p-2 bg-blue-50 border-2 border-blue-100 rounded-xl font-bold text-xs h-48 outline-none focus:border-blue-500 shadow-inner"></select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase">Producto</label>
                    <select id="selProducto" onchange="calcular()" class="w-full p-2 bg-gray-50 rounded-xl font-bold text-xs outline-none border border-gray-100"></select>
                </div>
                <button onclick="enviarWhatsApp()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-2xl shadow-lg hover:bg-emerald-700 transition-all uppercase text-[11px] mt-4">
                    <i class="fab fa-whatsapp mr-2 text-lg"></i> Enviar a Harold
                </button>
            </div>

            <div id="seccionGrafico" class="hidden lg:col-span-3 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-blue-800 text-white p-6 rounded-[2rem] shadow-2xl text-center">
                        <p class="text-[10px] font-bold opacity-70 uppercase mb-1 tracking-widest italic">Kilos Despachados</p>
                        <h2 id="totalDisplay" class="text-4xl font-black tracking-tighter italic">0.00 Kg</h2>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] shadow-xl border-l-8 border-emerald-500 flex flex-col justify-center">
                        <h4 class="text-[11px] font-black text-emerald-700 uppercase mb-2 italic tracking-tighter"><i class="fas fa-chart-line mr-1"></i> Análisis de Gestión:</h4>
                        <div id="analisisNotas" class="text-xs space-y-1 font-bold text-gray-600 italic">
                            <p id="mejorVendedor">Cargando...</p>
                            <p id="mejorCiudad">Cargando...</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100">
                    <canvas id="miGrafico" height="140"></canvas>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-white/95 border-t p-3 text-center">
        <p class="text-[10px] font-black text-blue-900 uppercase italic tracking-widest">App desarrollada por Vibras Positivas (3117700431)</p>
    </footer>

    <script>
        let baseDatos = [];
        let chartInstance = null;

        window.onload = function() {
            try {
                const dataGuardada = localStorage.getItem('distrileco_v4');
                if(dataGuardada) {
                    baseDatos = JSON.parse(dataGuardada);
                    document.getElementById('status').innerText = "✅ MEMORIA ACTIVA (" + baseDatos.length + " LÍNEAS)";
                    mostrarApp();
                }
            } catch (e) { console.log("Espacio limpio"); }
        };

        document.getElementById('upload').addEventListener('change', function(e) {
            const status = document.getElementById('status');
            status.innerText = "⏳ Procesando...";
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                    const nombreHoja = workbook.SheetNames.find(n => n.toLowerCase().trim().includes('data')) || workbook.SheetNames[0];
                    const sheet = workbook.Sheets[nombreHoja];
                    const rawJson = XLSX.utils.sheet_to_json(sheet);

                    baseDatos = rawJson.map(f => {
                        let n = {};
                        for (let k in f) {
                            let cleanK = k.toString().toLowerCase().trim().replace(/\s+/g, '');
                            // Solo guardamos las columnas necesarias para ahorrar espacio
                            if(['cantidad','peso','mes','nomvendedor','ciudad','nombre_producto','valor'].includes(cleanK)) {
                                n[cleanK] = f[k];
                            }
                        }
                        return n;
                    });

                    try {
                        localStorage.setItem('distrileco_v4', JSON.stringify(baseDatos));
                    } catch (e) {
                        console.warn("Límite de memoria superado, funcionando en sesión actual.");
                        status.innerText = "⚠️ MEMORIA LLENA, PERO DATOS CARGADOS";
                    }

                    status.innerText = "✅ DATOS ACTUALIZADOS: " + baseDatos.length + " REGISTROS";
                    mostrarApp();
                } catch (err) { status.innerText = "❌ ERROR AL PROCESAR"; }
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function mostrarApp() {
            llenarCombos();
            document.getElementById('seccionFiltros').classList.remove('hidden');
            document.getElementById('seccionGrafico').classList.remove('hidden');
            calcular();
        }

        function llenarCombos() {
            const vSet = new Set(['-- TODOS --']);
            const mSet = new Set();
            const pSet = new Set(['-- TODOS --']);
            baseDatos.forEach(f => {
                if(f.nomvendedor) vSet.add(f.nomvendedor.toString().trim());
                if(f.mes) mSet.add(f.mes.toString().trim());
                if(f.nombre_producto) pSet.add(f.nombre_producto.toString().trim());
            });
            poblar('selVendedor', vSet);
            poblar('selMes', mSet, true);
            poblar('selProducto', pSet);
        }

        function poblar(id, s, multi = false) {
            const el = document.getElementById(id);
            el.innerHTML = "";
            Array.from(s).sort().forEach(v => {
                let o = document.createElement('option');
                o.value = v; o.text = v;
                if(multi) o.selected = true;
                el.appendChild(o);
            });
        }

        function calcular() {
            const v = document.getElementById('selVendedor').value;
            const meses = Array.from(document.getElementById('selMes').selectedOptions).map(opt => opt.value);
            const p = document.getElementById('selProducto').value;
            let total = 0; let datosGrafico = {};
            let rankV = {}; let rankC = {};
            meses.forEach(m => datosGrafico[m] = 0);

            baseDatos.forEach(f => {
                const mesF = f.mes?.toString().trim();
                const matchV = (v === '-- TODOS --' || f.nomvendedor?.toString().trim() === v);
                const matchM = (meses.includes(mesF));
                const matchP = (p === '-- TODOS --' || f.nombre_producto?.toString().trim() === p);
                if(matchV && matchM && matchP) {
                    const kilos = (parseFloat(f.cantidad) || 0) * (parseFloat(f.peso) || 0);
                    total += kilos;
                    if(mesF) datosGrafico[mesF] += kilos;
                    if(f.nomvendedor) rankV[f.nomvendedor] = (rankV[f.nomvendedor] || 0) + kilos;
                    if(f.ciudad) rankC[f.ciudad] = (rankC[f.ciudad] || 0) + kilos;
                }
            });

            document.getElementById('totalDisplay').innerText = total.toLocaleString('es-CO', {minimumFractionDigits: 1}) + " Kg";
            const mejorV = Object.entries(rankV).sort((a,b) => b[1] - a[1])[0];
            const mejorC = Object.entries(rankC).sort((a,b) => b[1] - a[1])[0];
            document.getElementById('mejorVendedor').innerHTML = mejorV ? `<span class="text-blue-900 font-bold">Vendedor Estrella:</span> ${mejorV[0]}` : "N/A";
            document.getElementById('mejorCiudad').innerHTML = mejorC ? `<span class="text-blue-900 font-bold">Ciudad Líder:</span> ${mejorC[0]}` : "N/A";
            actualizarGrafico(datosGrafico);
        }

        function actualizarGrafico(datos) {
            const ctx = document.getElementById('miGrafico').getContext('2d');
            const labels = Object.keys(datos).sort();
            const values = labels.map(l => datos[l]);
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: 'Kilos', data: values, backgroundColor: '#1e40af', borderRadius: 12 }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        function enviarWhatsApp() {
            const t = document.getElementById('totalDisplay').innerText;
            const mv = document.getElementById('mejorVendedor').innerText;
            const mc = document.getElementById('mejorCiudad').innerText;
            const txt = `🍚 *REPORTE DISTRILECO*\n📊 *Kilos:* ${t}\n🥇 *${mv}*\n📍 *${mc}*\n_Vibras Positivas_`;
            window.open(`https://wa.me/3117700431?text=${encodeURIComponent(txt)}`, '_blank');
        }

        function borrarMemoria() {
            if(confirm("¿Limpiar todos los datos guardados?")) { localStorage.clear(); location.reload(); }
        }
    </script>
</body>
</html>

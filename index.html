<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador Distrileco - Vibras Positivas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="bg-blue-900 text-white p-6 shadow-xl text-center">
        <h1 class="text-2xl font-black italic">DISTRILECO CAUCASIA</h1>
        <p class="text-xs opacity-70 uppercase tracking-widest">Gestión Inteligente de Empaquetadora</p>
    </header>

    <main class="p-4 max-w-5xl mx-auto space-y-6">
        
        <div class="bg-white p-8 rounded-3xl shadow-sm border-2 border-dashed border-blue-200 text-center">
            <h2 class="text-xl font-bold text-blue-900 mb-2">📥 Paso 1: Sube tu archivo Excel</h2>
            <input type="file" id="upload" accept=".xlsx, .xls, .csv" class="mx-auto block text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
        </div>

        <div id="seccionConsulta" class="bg-white p-6 rounded-3xl shadow-lg border-t-4 border-yellow-400 hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-4 italic">🔍 ¿Qué quieres saber hoy?</h2>
            <div class="flex flex-wrap gap-2 mb-6">
                <button onclick="consultar('producto')" class="bg-blue-100 text-blue-800 px-4 py-2 rounded-full font-bold hover:bg-blue-200 transition">Kilos por Producto</button>
                <button onclick="consultar('mes')" class="bg-green-100 text-green-800 px-4 py-2 rounded-full font-bold hover:bg-green-200 transition">Kilos por Mes</button>
                <button onclick="consultar('vendedor')" class="bg-purple-100 text-purple-800 px-4 py-2 rounded-full font-bold hover:bg-purple-200 transition">Kilos por Vendedor</button>
            </div>
            
            <input type="text" id="buscador" onkeyup="filtrarTabla()" placeholder="Escribe un nombre, producto o mes..." class="w-full p-4 border-2 border-gray-100 rounded-2xl focus:border-blue-500 outline-none shadow-inner">
        </div>

        <div id="tablaResultados" class="bg-white rounded-3xl shadow-sm overflow-hidden hidden">
            <div id="tituloTabla" class="bg-gray-800 text-white p-4 font-bold uppercase text-sm text-center">Resultados</div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-gray-50 text-[10px] font-black text-gray-500 uppercase">
                            <th class="p-4 border-b" id="columnaNombre">Categoría</th>
                            <th class="p-4 border-b text-right">Kilos Totales (KG)</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="text-gray-700 font-bold">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <footer class="fixed bottom-0 w-full bg-white border-t p-3 text-center text-[10px] text-gray-500">
        <p class="font-bold text-blue-900">App desarrollada por Vibras Positivas (3117700431) - Derechos de Autor</p>
    </footer>

    <script>
        let datosGlobales = [];

        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(evt) {
                const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                datosGlobales = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                document.getElementById('seccionConsulta').classList.remove('hidden');
                alert("Archivo cargado con éxito. Elige qué quieres consultar.");
            };
            reader.readAsBinaryString(file);
        });

        function consultar(tipo) {
            document.getElementById('tablaResultados').classList.remove('hidden');
            const titulo = document.getElementById('tituloTabla');
            const colNombre = document.getElementById('columnaNombre');
            const tbody = document.getElementById('cuerpoTabla');
            tbody.innerHTML = "";

            let resumen = {};
            let columnaClave = "";

            if(tipo === 'producto') { 
                titulo.innerText = "RESUMEN POR PRODUCTO"; colNombre.innerText = "PRODUCTO"; columnaClave = 'nombre_producto'; 
            }
            if(tipo === 'mes') { 
                titulo.innerText = "RESUMEN POR MES"; colNombre.innerText = "MES (AÑO/MES)"; columnaClave = 'mes'; 
            }
            if(tipo === 'vendedor') { 
                titulo.innerText = "RESUMEN POR VENDEDOR"; colNombre.innerText = "VENDEDOR"; columnaClave = 'nomvendedor'; 
            }

            datosGlobales.forEach(row => {
                const clave = row[columnaClave] || "SIN DATO";
                const kilos = (parseFloat(row.cantidad) || 0) * (parseFloat(row.PESO) || 0);
                resumen[clave] = (resumen[clave] || 0) + kilos;
            });

            // Ordenar de mayor a menor
            const ordenado = Object.entries(resumen).sort((a,b) => b[1] - a[1]);

            ordenado.forEach(([nombre, kilos]) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50 border-b border-gray-50">
                        <td class="p-4 text-sm">${nombre}</td>
                        <td class="p-4 text-right font-black text-blue-900">${kilos.toLocaleString()} KG</td>
                    </tr>
                `;
            });
        }

        function filtrarTabla() {
            const input = document.getElementById("buscador").value.toUpperCase();
            const rows = document.getElementById("cuerpoTabla").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                const txtValue = rows[i].textContent || rows[i].innerText;
                rows[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    </script>
</body>
</html>

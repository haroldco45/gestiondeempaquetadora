<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empaquetadora - Distrileco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e40af; --secondary: #facc15; }
        .bg-distrileco { background-color: var(--primary); }
        .btn-vibras { background-color: var(--secondary); color: #000; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <header class="bg-distrileco text-white p-4 shadow-lg flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold italic">DISTRILECO CAUCASIA</h1>
            <p class="text-xs">Gestión de Empaquetadora de Arroz</p>
        </div>
        <i class="fas fa-boxes text-2xl"></i>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <form id="formVentas" class="bg-white p-6 rounded-xl shadow-md space-y-4">
            <h2 class="text-center font-bold text-gray-700 border-b pb-2">REGISTRO DE VENTA</h2>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold uppercase">Mes</label>
                    <select name="mes" class="w-full border p-2 rounded bg-gray-50">
                        <option>Enero</option><option>Febrero</option><option>Marzo</option>
                        <option>Abril</option><option>Mayo</option><option>Junio</option>
                        <option>Julio</option><option>Agosto</option><option>Septiembre</option>
                        <option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase">Fecha</label>
                    <input type="date" name="fecha" id="fecha_actual" class="w-full border p-2 rounded bg-gray-50">
                </div>
            </div>

            <div class="space-y-3">
                <input type="text" name="nomvendedor" placeholder="Nombre del Vendedor" class="w-full border p-2 rounded" required>
                <input type="text" name="ciudad" placeholder="Ciudad / Municipio" class="w-full border p-2 rounded" value="Caucasia">
                
                <div class="border-t pt-2 mt-2">
                    <label class="block text-xs font-bold text-blue-800">DETALLES DEL PRODUCTO</label>
                    <input type="text" name="referencia_proveedor" placeholder="Ref. Proveedor" class="w-full border p-2 rounded mt-1">
                    <input type="text" name="referencia" placeholder="Referencia Interna" class="w-full border p-2 rounded mt-2">
                    <select name="nombre_producto" class="w-full border p-2 rounded mt-2 font-bold">
                        <option value="">Seleccione Producto...</option>
                        <option value="SUPERARROZ">SUPERARROZ</option>
                        <option value="VISTAHERMOSA">VISTAHERMOSA</option>
                    </select>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-[10px] font-bold">CANTIDAD</label>
                        <input type="number" id="cantidad" name="cantidad" placeholder="Cant." class="w-full border p-2 rounded" oninput="calcularKilos()">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold">PESO (KG)</label>
                        <input type="number" step="0.01" id="peso" name="PESO" placeholder="Kg x Uni" class="w-full border p-2 rounded" oninput="calcularKilos()">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold">VALOR ($)</label>
                        <input type="number" name="valor" placeholder="Total $" class="w-full border p-2 rounded text-green-700 font-bold">
                    </div>
                </div>

                <div class="bg-blue-50 p-3 rounded-lg border border-blue-200">
                    <p class="text-sm font-bold text-blue-900 italic">Total Kilos a Despachar: <span id="totalKilos" class="text-lg">0.00</span> Kg</p>
                </div>
                
                <input type="text" name="numero" placeholder="Número de Factura / Pedido" class="w-full border p-2 rounded">
            </div>

            <button type="submit" class="w-full btn-vibras py-3 rounded-lg shadow hover:bg-yellow-500 transition-all uppercase">
                <i class="fab fa-whatsapp mr-2"></i> Reportar Venta
            </button>
        </form>
    </main>

    <footer class="fixed bottom-0 w-full bg-white border-t p-2 text-center text-[10px] text-gray-500">
        <p class="font-bold text-blue-900">App desarrollada por Vibras Positivas (3117700431) - Derechos de Autor</p>
        <p>© 2026 Distrileco Caucasia - Gestión de Ventas</p>
    </footer>

    <script>
        // Establecer fecha de hoy automáticamente
        document.getElementById('fecha_actual').valueAsDate = new Date();

        // Función para calcular kilos en tiempo real
        function calcularKilos() {
            const cant = document.getElementById('cantidad').value || 0;
            const peso = document.getElementById('peso').value || 0;
            const total = (parseFloat(cant) * parseFloat(peso)).toFixed(2);
            document.getElementById('totalKilos').innerText = total;
        }

        // Manejo del formulario
        document.getElementById('formVentas').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            const totalK = (data.cantidad * data.PESO).toFixed(2);
            
            // Mensaje para WhatsApp
            const texto = `📦 *NUEVA VENTA DISTRILECO*\n` +
                          `--------------------------\n` +
                          `👤 *Vendedor:* ${data.nomvendedor}\n` +
                          `🍚 *Producto:* ${data.nombre_producto}\n` +
                          `🔢 *Cant:* ${data.cantidad} und\n` +
                          `⚖️ *Kilos:* ${totalK} Kg\n` +
                          `💰 *Valor:* $${data.valor}\n` +
                          `📍 *Ciudad:* ${data.ciudad}\n` +
                          `--------------------------\n` +
                          `_Enviado desde Gestión de Empaquetadora_`;
            
            const encodedText = encodeURIComponent(texto);
            window.open(`https://wa.me/3117700431?text=${encodedText}`, '_blank');
        });
    </script>
</body>
</html>

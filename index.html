<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Kilaje - Distrileco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen pb-24 font-sans">

    <header class="bg-blue-900 text-white p-6 shadow-xl text-center">
        <h1 class="text-2xl font-black italic">DISTRILECO CAUCASIA</h1>
        <p class="text-[10px] uppercase font-bold tracking-widest opacity-70">Análisis de Datos Empaquetadora</p>
    </header>

    <main class="p-4 max-w-4xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-3xl shadow-md border-2 border-dashed border-blue-300 text-center">
            <p class="text-blue-900 font-bold mb-3 uppercase text-xs">📂 PASO 1: SELECCIONA EL ARCHIVO EXCEL</p>
            <input type="file" id="upload" accept=".xlsx, .xls, .csv" class="mx-auto block text-sm text-gray-500 file:mr-4 file:py-2 file:px-6 file:rounded-full file:border-0 file:bg-blue-600 file:text-white font-bold cursor-pointer">
            <p id="status" class="mt-3 text-xs font-bold text-emerald-600 italic"></p>
        </div>

        <div id="seccionFiltros" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 bg-white p-6 rounded-3xl shadow-lg border-b-8 border-yellow-400">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-blue-800 ml-2 uppercase">Vendedor</label>
                <select id="selVendedor" onchange="aplicarCalculos()" class="w-full p-3 bg-gray-50 border-none rounded-xl font-bold text-gray-700 shadow-inner"></select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black text-blue-800 ml-2 uppercase">Mes</label>
                <select id="selMes" onchange="aplicarCalculos()" class="w-full p-3 bg-gray-50 border-none rounded-xl font-bold text-gray-700 shadow-inner"></select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black text-blue-800 ml-2 uppercase">Producto</label>
                <select id="selProducto" onchange="aplicarCalculos()" class="w-full p-3 bg-gray-50 border-none rounded-xl font-bold text-gray-700 shadow-inner"></select>
            </div>
        </div>

        <div id="resultadoFinal" class="hidden">
            <div class="bg-blue-800 text-white p-10 rounded-[2.5rem] shadow-2xl text-center border-4 border-white">
                <p class="text-xs font-bold opacity-70 uppercase mb-2">Total Kilos Calculados</p>
                <h2 id="totalKilosDisplay" class="text-6xl font-black tracking-tighter">0.00 Kg</h2>
            </div>
            <p class="text-center text-[10px] text-gray-400 mt-4 uppercase font-bold">Selecciona opciones en los cajones para filtrar</p>
        </div>

    </main>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4 text-center">
        <p class="text-[10px] font-black text-blue-900 uppercase italic">
            App desarrollada por Vibras Positivas (3117700431) - Derechos de Autor
        </p>
    </footer>

    <script>
        let baseDatos = [];

        document.getElementById('upload').addEventListener('change', function(e) {
            const status = document.getElementById('status');
            status.innerText = "⏳ Procesando datos...";
            
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonRaw = XLSX.utils.sheet_to_json(sheet);

                    // NORMALIZACIÓN DE COLUMNAS (Clave para que funcione)
                    baseDatos = jsonRaw.map(fila => {
                        let nuevaFila = {};
                        for (let clave in fila) {
                            // Limpia el nombre de la columna: minúsculas y sin espacios
                            let claveLimpia = clave.toString().toLowerCase().trim();
                            nuevaFila[claveLimpia] = fila[clave];
                        }
                        return nuevaFila;
                    });

                    if(baseDatos.length > 0) {
                        status.innerText = "✅ " + baseDatos.length + " REGISTROS CARGADOS";
                        generarSelectores();
                        document.getElementById('seccionFiltros').classList.remove('hidden');
                        document.getElementById('resultadoFinal').classList.remove('hidden');
                        aplicarCalculos();
                    }
                } catch (err) {
                    status.innerText = "❌ ERROR AL LEER EXCEL";
                }
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function generarSelectores() {
            const vSet = new Set(['-- TODOS --']);
            const mSet = new Set(['-- TODOS --']);
            const pSet = new Set(['-- TODOS --']);

            baseDatos.forEach(f => {
                if(f.nomvendedor) vSet.add(f.nomvendedor.toString().trim());
                if(f.mes) mSet.add(f.mes.toString().trim());
                if(f.nombre_producto) pSet.add(f.nombre_producto.toString().trim());
            });

            rellenar('selVendedor', vSet);
            rellenar('selMes', mSet);
            rellenar('selProducto', pSet);
        }

        function rellenar(id, conjunto) {
            const select = document.getElementById(id);
            select.innerHTML = "";
            Array.from(conjunto).sort().forEach(val => {
                let op = document.createElement('option');
                op.value = val; op.text = val;
                select.appendChild(op);
            });
        }

        function aplicarCalculos() {
            const vSel = document.getElementById('selVendedor').value;
            const mSel = document.getElementById('selMes').value;
            const pSel = document.getElementById('selProducto').value;

            let totalKg = 0;

            baseDatos.forEach(f => {
                const cumpleV = (vSel === '-- TODOS --' || f.nomvendedor?.toString().trim() === vSel);
                const cumpleM = (mSel === '-- TODOS --' || f.mes?.toString().trim() === mSel);
                const cumpleP = (pSel === '-- TODOS --' || f.nombre_producto?.toString().trim() === pSel);

                if(cumpleV && cumpleM && cumpleP) {
                    // Buscamos las columnas sin importar mayúsculas/minúsculas
                    const c = parseFloat(f.cantidad) || 0;
                    const p = parseFloat(f.peso) || 0; // El código ya normalizó "PESO" a "peso"
                    totalKg += (c * p);
                }
            });

            document.getElementById('totalKilosDisplay').innerText = totalKg.toLocaleString('es-CO', {minimumFractionDigits: 2}) + " Kg";
        }
    </script>
</body>
</html>

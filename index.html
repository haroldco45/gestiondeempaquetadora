<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador Distrileco - Versión Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen pb-24">

    <header class="bg-blue-900 text-white p-6 shadow-xl text-center">
        <h1 class="text-2xl font-black italic">DISTRILECO CAUCASIA</h1>
        <p class="text-xs opacity-75 uppercase font-bold">Gestión de Kilaje - Vibras Positivas</p>
    </header>

    <main class="p-4 max-w-4xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border-2 border-dashed border-blue-300 text-center">
            <p class="text-blue-900 font-bold mb-3">📂 Paso 1: Selecciona tu archivo de Excel</p>
            <input type="file" id="upload" accept=".xlsx, .xls, .csv" class="mx-auto block text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
            <p id="status" class="mt-2 text-xs text-gray-500 font-bold italic"></p>
        </div>

        <div id="seccionFiltros" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 bg-white p-6 rounded-3xl shadow-lg border-b-8 border-yellow-400">
            <div>
                <label class="block text-[10px] font-black text-blue-900 mb-1 uppercase">Vendedor</label>
                <select id="selVendedor" onchange="aplicarFiltros()" class="w-full p-3 border border-gray-200 rounded-xl font-bold bg-gray-50"></select>
            </div>
            <div>
                <label class="block text-[10px] font-black text-blue-900 mb-1 uppercase">Mes</label>
                <select id="selMes" onchange="aplicarFiltros()" class="w-full p-3 border border-gray-200 rounded-xl font-bold bg-gray-50"></select>
            </div>
            <div>
                <label class="block text-[10px] font-black text-blue-900 mb-1 uppercase">Producto</label>
                <select id="selProducto" onchange="aplicarFiltros()" class="w-full p-3 border border-gray-200 rounded-xl font-bold bg-gray-50"></select>
            </div>
        </div>

        <div id="resultadoFinal" class="hidden space-y-4">
            <div class="bg-blue-800 text-white p-8 rounded-3xl shadow-2xl text-center relative overflow-hidden">
                <p class="text-xs font-bold opacity-70 uppercase mb-1">Total Kilos Calculados</p>
                <h2 id="totalKilosDisplay" class="text-5xl font-black tracking-tighter">0.00 Kg</h2>
                <div class="absolute -right-4 -bottom-4 opacity-10">
                   <i class="fas fa-balance-scale text-9xl"></i>
                </div>
            </div>
            
            <button onclick="window.location.reload()" class="w-full py-2 text-xs text-blue-600 font-bold hover:underline">🔄 Cargar otro archivo</button>
        </div>

    </main>

    <footer class="fixed bottom-0 w-full bg-white border-t p-3 text-center text-[10px] text-gray-500">
        <p class="font-bold text-blue-900 italic uppercase">App desarrollada por Vibras Positivas (3117700431) - Derechos de Autor</p>
    </footer>

    <script>
        let datosGlobales = [];

        document.getElementById('upload').addEventListener('change', function(e) {
            const status = document.getElementById('status');
            status.innerText = "⏳ Procesando archivo...";
            
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(evt) {
                try {
                    const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                    const primeraHoja = workbook.Sheets[workbook.SheetNames[0]];
                    let rawData = XLSX.utils.sheet_to_json(primeraHoja);

                    // LIMPIEZA DE COLUMNAS (Quita espacios y mayúsculas)
                    datosGlobales = rawData.map(row => {
                        let newRow = {};
                        for (let key in row) {
                            newRow[key.trim().toLowerCase()] = row[key];
                        }
                        return newRow;
                    });

                    status.innerText = "✅ ¡Archivo cargado con " + datosGlobales.length + " registros!";
                    llenarSelectores();
                    document.getElementById('seccionFiltros').classList.remove('hidden');
                    document.getElementById('resultadoFinal').classList.remove('hidden');
                    aplicarFiltros(); // Cálculo inicial
                } catch (err) {
                    status.innerText = "❌ Error al leer el archivo. Revisa que sea un Excel válido.";
                    console.error(err);
                }
            };
            reader.readAsBinaryString(file);
        });

        function llenarSelectores() {
            const vSet = new Set(['-- TODOS --']);
            const mSet = new Set(['-- TODOS --']);
            const pSet = new Set(['-- TODOS --']);

            datosGlobales.forEach(row => {
                if(row.nomvendedor) vSet.add(row.nomvendedor.toString().trim());
                if(row.mes) mSet.add(row.mes.toString().trim());
                if(row.nombre_producto) pSet.add(row.nombre_producto.toString().trim());
            });

            poblar('selVendedor', vSet);
            poblar('selMes', mSet);
            poblar('selProducto', pSet);
        }

        function poblar(id, set) {
            const select = document.getElementById(id);
            select.innerHTML = "";
            [...set].sort().forEach(v => {
                let opt = document.createElement('option');
                opt.value = v; opt.text = v;
                select.appendChild(opt);
            });
        }

        function aplicarFiltros() {
            const v = document.getElementById('selVendedor').value;
            const m = document.getElementById('selMes').value;
            const p = document.getElementById('selProducto').value;

            let total = 0;
            datosGlobales.forEach(row => {
                const matchV = (v === '-- TODOS --' || row.nomvendedor?.toString().trim() === v);
                const matchM = (m === '-- TODOS --' || row.mes?.toString().trim() === m);
                const matchP = (p === '-- TODOS --' || row.nombre_producto?.toString().trim() === p);

                if(matchV && matchM && matchP) {
                    const cant = parseFloat(row.cantidad) || 0;
                    const peso = parseFloat(row.peso) || 0; // Busca "peso" en minúsculas
                    total += (cant * peso);
                }
            });

            document.getElementById('totalKilosDisplay').innerText = total.toLocaleString('es-CO', {minimumFractionDigits: 2}) + " Kg";
        }
    </script>
</body>
</html>

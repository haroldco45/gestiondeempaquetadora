<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Hoja 1 - Distrileco</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-24 font-sans text-gray-800">

    <header class="bg-blue-900 text-white p-6 shadow-xl text-center">
        <h1 class="text-2xl font-black italic tracking-tighter">DISTRILECO CAUCASIA</h1>
        <p class="text-[10px] uppercase font-bold tracking-widest opacity-75">Análisis Exclusivo Hoja 1</p>
    </header>

    <main class="p-4 max-w-4xl mx-auto space-y-6">
        
        <div class="bg-white p-8 rounded-3xl shadow-md border-2 border-dashed border-blue-400 text-center">
            <p class="text-blue-900 font-bold mb-4 uppercase text-xs">📂 PASO 1: CARGAR EXCEL DE EMPAQUETADORA</p>
            <input type="file" id="upload" accept=".xlsx, .xls, .csv" class="mx-auto block text-sm text-gray-500 file:mr-4 file:py-2 file:px-8 file:rounded-full file:border-0 file:bg-blue-700 file:text-white font-bold cursor-pointer hover:file:bg-blue-800 transition-all">
            <p id="status" class="mt-4 text-sm font-bold text-emerald-600 italic"></p>
        </div>

        <div id="seccionFiltros" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 bg-white p-6 rounded-3xl shadow-lg border-b-8 border-yellow-400">
            <div class="space-y-1">
                <label class="text-[10px] font-black text-blue-900 ml-2 uppercase">Vendedor</label>
                <select id="selVendedor" onchange="calcular()" class="w-full p-3 bg-gray-50 border-none rounded-xl font-bold text-gray-700 shadow-inner"></select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black text-blue-900 ml-2 uppercase">Mes</label>
                <select id="selMes" onchange="calcular()" class="w-full p-3 bg-gray-50 border-none rounded-xl font-bold text-gray-700 shadow-inner"></select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black text-blue-900 ml-2 uppercase">Producto</label>
                <select id="selProducto" onchange="calcular()" class="w-full p-3 bg-gray-50 border-none rounded-xl font-bold text-gray-700 shadow-inner"></select>
            </div>
        </div>

        <div id="resultadoFinal" class="hidden">
            <div class="bg-gradient-to-br from-blue-900 to-blue-800 text-white p-12 rounded-[2.5rem] shadow-2xl text-center border-4 border-white relative overflow-hidden">
                <p class="text-xs font-bold opacity-70 uppercase mb-2 tracking-widest">Kilaje Total (Hoja 1)</p>
                <h2 id="totalDisplay" class="text-7xl font-black tracking-tighter">0.00 Kg</h2>
                <div class="absolute right-4 bottom-4 opacity-5 text-8xl">📊</div>
            </div>
        </div>

    </main>

    <footer class="fixed bottom-0 w-full bg-white/90 backdrop-blur-sm border-t p-4 text-center">
        <p class="text-[10px] font-black text-blue-900 uppercase italic">
            App desarrollada por Vibras Positivas (3117700431) - Derechos de Autor
        </p>
    </footer>

    <script>
        let dataH1 = [];

        document.getElementById('upload').addEventListener('change', function(e) {
            const status = document.getElementById('status');
            status.innerText = "⏳ Accediendo a Hoja 1...";
            
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                    
                    // BUSCAR "HOJA1" (Ignora mayúsculas o espacios)
                    const nombreHoja1 = workbook.SheetNames.find(n => n.toLowerCase().replace(/\s/g, '') === 'hoja1') || workbook.SheetNames[0];
                    const sheet = workbook.Sheets[nombreHoja1];
                    
                    // Convertir a matriz para limpiar encabezados sucios
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    const headerRowIndex = rows.findIndex(r => r.some(c => c?.toString().toLowerCase().includes('cantidad')));
                    
                    // Cargar datos reales desde la fila donde está la tabla
                    const rawJson = XLSX.utils.sheet_to_json(sheet, { range: headerRowIndex > -1 ? headerRowIndex : 0 });

                    // Normalización final
                    dataH1 = rawJson.map(f => {
                        let n = {};
                        for (let k in f) {
                            let cleanK = k.toString().toLowerCase().trim().replace(/\s+/g, '');
                            n[cleanK] = f[k];
                        }
                        return n;
                    });

                    if(dataH1.length > 0) {
                        status.innerText = "✅ HOJA 1 CARGADA: " + dataH1.length + " LÍNEAS";
                        llenarCombos();
                        document.getElementById('seccionFiltros').classList.remove('hidden');
                        document.getElementById('resultadoFinal').classList.remove('hidden');
                        calcular();
                    } else {
                        status.innerText = "❌ No hay datos en la Hoja 1.";
                    }
                } catch (err) {
                    status.innerText = "❌ Error procesando el archivo.";
                    console.error(err);
                }
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        function llenarCombos() {
            const vSet = new Set(['-- TODOS --']);
            const mSet = new Set(['-- TODOS --']);
            const pSet = new Set(['-- TODOS --']);

            dataH1.forEach(f => {
                if(f.nomvendedor) vSet.add(f.nomvendedor.toString().trim());
                if(f.mes) mSet.add(f.mes.toString().trim());
                if(f.nombre_producto) pSet.add(f.nombre_producto.toString().trim());
            });

            poblar('selVendedor', vSet);
            poblar('selMes', mSet);
            poblar('selProducto', pSet);
        }

        function poblar(id, s) {
            const el = document.getElementById(id);
            el.innerHTML = "";
            Array.from(s).sort().forEach(v => {
                let o = document.createElement('option');
                o.value = v; o.text = v;
                el.appendChild(o);
            });
        }

        function calcular() {
            const v = document.getElementById('selVendedor').value;
            const m = document.getElementById('selMes').value;
            const p = document.getElementById('selProducto').value;

            let total = 0;
            dataH1.forEach(f => {
                const matchV = (v === '-- TODOS --' || f.nomvendedor?.toString().trim() === v);
                const matchM = (m === '-- TODOS --' || f.mes?.toString().trim() === m);
                const matchP = (p === '-- TODOS --' || f.nombre_producto?.toString().trim() === p);

                if(matchV && matchM && matchP) {
                    const cant = parseFloat(f.cantidad) || 0;
                    const peso = parseFloat(f.peso) || 0;
                    total += (cant * peso);
                }
            });

            document.getElementById('totalDisplay').innerText = total.toLocaleString('es-CO', {minimumFractionDigits: 2}) + " Kg";
        }
    </script>
</body>
</html>
